version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: invoiceflow_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/invoiceflow
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: invoiceflow_worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/invoiceflow
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: invoiceflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoiceflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: invoiceflow_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: